<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reset password — Weighted</title>
  <meta name="robots" content="noindex" />
  <style>
    :root {
      --bg: #000000;
      --card: #0c0c0e;
      --text: #e6e6e6;
      --muted: #9aa0a6;
      --accent: #8fc9ff;
      --line: #1c1c20;
      --ok: #4cc38a;
      --err: #E5484D;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .wrap { width: 100%; max-width: 420px; margin: 0 auto; padding: 40px 22px; }
    .brand {
      display: inline-flex; align-items: center; justify-content: center;
      width: 64px; height: 64px; border-radius: 15px;
      background: #0c1318; border: 1px solid var(--line);
      margin-bottom: 22px;
    }
    .brand img { width: 40px; height: 40px; object-fit: contain; }
    h1 { font-size: 26px; margin: 0 0 6px; letter-spacing: -0.5px; }
    p { margin: 0 0 16px; color: var(--muted); font-size: 15px; }
    label { display: block; font-size: 13px; color: var(--muted); margin: 14px 0 6px; }
    input {
      width: 100%; padding: 14px 14px; font-size: 16px;
      background: var(--card); color: var(--text);
      border: 1px solid var(--line); border-radius: 12px; outline: none;
    }
    input:focus { border-color: #2f3a44; }
    button {
      width: 100%; margin-top: 20px; padding: 15px; font-size: 16px; font-weight: 700;
      background: #cfd6dd; color: #000; border: none; border-radius: 14px; cursor: pointer;
    }
    button:disabled { opacity: 0.5; cursor: default; }
    .msg { font-size: 14px; margin-top: 14px; }
    .msg.err { color: var(--err); }
    .msg.ok { color: var(--ok); }
    .hidden { display: none; }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="brand"><img src="logo.png" alt="Weighted" /></div>
    <h1>Reset your password</h1>

    <div id="form-view">
      <p>Choose a new password for your Weighted account.</p>
      <label for="pw">New password</label>
      <input id="pw" type="password" autocomplete="new-password" placeholder="At least 8 characters" />
      <label for="pw2">Confirm new password</label>
      <input id="pw2" type="password" autocomplete="new-password" placeholder="Repeat password" />
      <button id="save" disabled>Set new password</button>
      <div id="msg" class="msg"></div>
    </div>

    <div id="done-view" class="hidden">
      <p style="color:var(--ok)">Your password has been updated. Open the Weighted app and log in with your new password.</p>
    </div>

    <div id="invalid-view" class="hidden">
      <p style="color:var(--err)">This reset link is invalid or has expired. Request a new one from the app (Log in → Forgot password?).</p>
    </div>
  </main>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const SUPABASE_URL = 'https://lfagnbtrviciwjqquqme.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxmYWduYnRydmljaXdqcXF1cW1lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4NTQ5MDQsImV4cCI6MjA5NjQzMDkwNH0.yrMnsPUYsnz_tHWQi38zTHKPSpuDI648LxAzZUvn1Io';

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: { detectSessionInUrl: true, flowType: 'implicit' },
    });

    const formView = document.getElementById('form-view');
    const doneView = document.getElementById('done-view');
    const invalidView = document.getElementById('invalid-view');
    const pw = document.getElementById('pw');
    const pw2 = document.getElementById('pw2');
    const saveBtn = document.getElementById('save');
    const msg = document.getElementById('msg');

    function show(view) {
      for (const v of [formView, doneView, invalidView]) v.classList.add('hidden');
      view.classList.remove('hidden');
    }

    // The recovery token arrives in the URL hash; supabase-js parses it and establishes a
    // short-lived session. If no session can be recovered, the link is invalid/expired.
    let ready = false;
    supabase.auth.onAuthStateChange((event, session) => {
      if (session) ready = true;
    });

    (async () => {
      // Give detectSessionInUrl a tick to parse the hash, then verify we have a session.
      await new Promise((r) => setTimeout(r, 600));
      const { data } = await supabase.auth.getSession();
      if (data.session || ready) {
        saveBtn.disabled = false;
      } else {
        show(invalidView);
      }
    })();

    saveBtn.addEventListener('click', async () => {
      msg.textContent = '';
      msg.className = 'msg';
      const p1 = pw.value, p2 = pw2.value;
      if (p1.length < 8) { msg.textContent = 'Password must be at least 8 characters.'; msg.classList.add('err'); return; }
      if (p1 !== p2) { msg.textContent = 'Passwords do not match.'; msg.classList.add('err'); return; }
      saveBtn.disabled = true;
      const { error } = await supabase.auth.updateUser({ password: p1 });
      if (error) {
        msg.textContent = error.message || 'Could not update password. The link may have expired.';
        msg.classList.add('err');
        saveBtn.disabled = false;
        return;
      }
      await supabase.auth.signOut();
      show(doneView);
    });
  </script>
</body>
</html>
